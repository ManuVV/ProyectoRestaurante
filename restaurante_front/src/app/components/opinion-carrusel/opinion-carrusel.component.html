<section class="opiniones-section py-5">
  <div class="container">
    <h2 class="text-center mb-5">¿Qué opinan nuestros clientes?</h2>

    <div id="opinionesCarousel" class="carousel slide" data-bs-ride="carousel">
      <div class="carousel-inner">

        <div
          class="carousel-item"
          *ngFor="let opinion of opiniones; let i = index"
          [class.active]="i === 0">
          <div class="d-flex flex-column align-items-center">
            <p class="fs-5 fst-italic text-center">"{{ opinion.texto }}"</p>
            <h5 class="fw-bold mt-3">{{ opinion.autor }}</h5>
          </div>
        </div>

      </div>

      <!-- Controles de navegación -->
      <button class="carousel-control-prev" type="button" data-bs-target="#opinionesCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
        <span class="visually-hidden">Anterior</span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#opinionesCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
        <span class="visually-hidden">Siguiente</span>
      </button>
    </div>

  </div>
</section>
